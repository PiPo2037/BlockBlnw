<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLOCK AI </title>

<style>
html,body{margin:0;background:#111;color:#fff;text-align:center;font-family:sans-serif}
canvas{background:#000;margin:10px auto;width:90vw;max-width:320px;display:block}
.wrap canvas{width:28vw;max-width:120px}
.wrap{display:flex;justify-content:center;gap:10px}
.preview{display:flex;flex-direction:column;align-items:center}
button{margin:6px;padding:10px;border-radius:8px}
</style>
</head>

<body>

<h2>OMEGA AI</h2>

<canvas id="board" width="320" height="320"></canvas>
<button onclick="reset()">รีเซ็ต</button>

<div class="wrap">
<canvas id="s0" width="200" height="200"></canvas>
<canvas id="s1" width="200" height="200"></canvas>
<canvas id="s2" width="200" height="200"></canvas>
</div>

<div id="preview"></div>

<script>
const SIZE=8,SHAPE=5;
const COLORS=["#f44","#fa0","#0cf"];

let board=Array.from({length:8},()=>Array(8).fill(0));
let shapes=[mk(),mk(),mk()];
let cache=new Map();

function mk(){return Array.from({length:5},()=>Array(5).fill(0));}

const c=board=document.getElementById("board");
const ctx=c.getContext("2d");

function draw(b=boardState){
ctx.clearRect(0,0,320,320);
for(let i=0;i<8;i++)for(let j=0;j<8;j++){
ctx.strokeStyle="#333";
ctx.strokeRect(j*40,i*40,40,40);
if(b[i][j]){ctx.fillStyle="#0f0";ctx.fillRect(j*40,i*40,40,40);}
}
}

let boardState=Array.from({length:8},()=>Array(8).fill(0));

c.addEventListener("touchstart",e=>{
e.preventDefault();
let r=c.getBoundingClientRect(),t=e.touches[0];
let x=Math.floor((t.clientY-r.top)/(r.height/8));
let y=Math.floor((t.clientX-r.left)/(r.width/8));
boardState[x][y]^=1;draw();
},{passive:false});

const sc=[s0,s1,s2];

sc.forEach((cv,i)=>{
cv.addEventListener("touchstart",e=>{
e.preventDefault();
let r=cv.getBoundingClientRect(),t=e.touches[0];
let x=Math.floor((t.clientY-r.top)/(r.height/5));
let y=Math.floor((t.clientX-r.left)/(r.width/5));
shapes[i][x][y]^=1;drawS(i);
},{passive:false});
});

function drawS(i){
let ctx=sc[i].getContext("2d");
ctx.clearRect(0,0,200,200);
for(let x=0;x<5;x++)for(let y=0;y<5;y++){
ctx.strokeStyle="#333";
ctx.strokeRect(y*40,x*40,40,40);
if(shapes[i][x][y]){
ctx.fillStyle=COLORS[i];
ctx.fillRect(y*40,x*40,40,40);
}
}
}

function trim(s){
let minX=5,minY=5,maxX=0,maxY=0,f=0;
for(let i=0;i<5;i++)for(let j=0;j<5;j++)
if(s[i][j]){f=1;minX=Math.min(minX,i);minY=Math.min(minY,j);maxX=Math.max(maxX,i);maxY=Math.max(maxY,j);}
if(!f)return [[0]];
let r=[];
for(let i=minX;i<=maxX;i++){
let row=[];
for(let j=minY;j<=maxY;j++)row.push(s[i][j]);
r.push(row);
}
return r;
}

function can(s,x,y,b){
for(let i=0;i<s.length;i++)for(let j=0;j<s[0].length;j++)
if(s[i][j]&&(x+i>=8||y+j>=8||b[x+i][y+j]))return 0;
return 1;
}

function clear(b){
let ch=1;
while(ch){
ch=0;
for(let i=0;i<8;i++)if(b[i].every(v=>v)){for(let j=0;j<8;j++)b[i][j]=0;ch=1;}
for(let j=0;j<8;j++){
let f=1;for(let i=0;i<8;i++)if(!b[i][j])f=0;
if(f){for(let i=0;i<8;i++)b[i][j]=0;ch=1;}
}
}
}

function sim(b,s,x,y){
let t=b.map(r=>r.slice());
for(let i=0;i<s.length;i++)for(let j=0;j<s[0].length;j++)
if(s[i][j])t[x+i][y+j]=1;
clear(t);
return t;
}

function hash(b){
return b.map(r=>r.join("")).join("");
}

function evalBoard(b){
let empty=0,holes=0,height=0,rough=0;

for(let i=0;i<8;i++){
let colHeight=0;
for(let j=0;j<8;j++){
if(b[i][j])colHeight++;
else empty++;
if(b[i][j]&&i+1<8&&!b[i+1][j])holes++;
}
height+=colHeight*colHeight;
}

for(let i=0;i<7;i++)
for(let j=0;j<8;j++)
rough+=Math.abs(b[i][j]-b[i+1][j]);

return empty*3 - holes*8 - height*0.6 - rough*2;
}

function search(){
let depth=6,beam=30;

let states=[{b:boardState,steps:[],score:0}];

for(let d=0;d<depth;d++){
let next=[];

for(let st of states){
let key=hash(st.b);
if(cache.has(key))continue;
cache.set(key,1);

for(let si=0;si<3;si++){
let s=trim(shapes[si]);

for(let x=0;x<8;x++)for(let y=0;y<8;y++){
if(can(s,x,y,st.b)){
let nb=sim(st.b,s,x,y);
let sc=evalBoard(nb);

next.push({
b:nb,
steps:[...st.steps,{shape:si,x,y}],
score:sc
});
}
}
}
}

next.sort((a,b)=>b.score-a.score);
states=next.slice(0,beam);
}

return states[0]?.steps;
}

function mini(id,b,s=null,x=0,y=0){
let c=document.getElementById(id);c.innerHTML="";
for(let i=0;i<8;i++){
for(let j=0;j<8;j++){
let d=document.createElement("div");
d.style.width="20px";d.style.height="20px";
d.style.display="inline-block";
d.style.border="1px solid #222";

let col=b[i][j]?"#0f0":"#000";

if(s){
for(let si=0;si<s.length;si++)
for(let sj=0;sj<s[0].length;sj++)
if(s[si][sj]&&i===x+si&&j===y+sj)col="#f00";
}

d.style.background=col;
c.appendChild(d);
}
c.appendChild(document.createElement("br"));
}
}

function show(){
let seq=search();
let t=JSON.parse(JSON.stringify(boardState));
let p=document.getElementById("preview");
p.innerHTML="";

seq?.forEach((st,i)=>{
let s=trim(shapes[st.shape]);

let d=document.createElement("div");
d.innerText="STEP "+(i+1);
p.appendChild(d);

let m=document.createElement("div");
m.id="m"+i;p.appendChild(m);

mini(m.id,t,s,st.x,st.y);
t=sim(t,s,st.x,st.y);
});
}

function apply(){
let seq=search();
let t=JSON.parse(JSON.stringify(boardState));
seq?.forEach(st=>{
let s=trim(shapes[st.shape]);
t=sim(t,s,st.x,st.y);
});
boardState=t;draw();
}

function reset(){
boardState=Array.from({length:8},()=>Array(8).fill(0));
shapes=[mk(),mk(),mk()];
draw();drawS(0);drawS(1);drawS(2);
}

draw();drawS(0);drawS(1);drawS(2);

document.body.insertAdjacentHTML("beforeend",`
<br>
<button onclick="show()">AI Ω</button>
<button onclick="apply()">ใช้</button>
`);
</script>

</body>
</html>
