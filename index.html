<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Block AI ENGINE</title>
<style>
body { background:#222; color:#fff; text-align:center; font-family:sans-serif; }
canvas { background:#111; margin:10px; }
.wrap { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
.preview { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<h2>Block AI ENGINE</h2>

<canvas id="board" width="320" height="320"></canvas>
<br>
<button onclick="resetBoard()">รีเซ็ต</button>

<div class="wrap">
  <canvas id="shape0" width="200" height="200"></canvas>
  <canvas id="shape1" width="200" height="200"></canvas>
  <canvas id="shape2" width="200" height="200"></canvas>
</div>

<div class="preview" id="preview"></div>

<script>
const SIZE = 8;
const SHAPE_SIZE = 5;

const COLORS = ["#ff4444","#ff9900","#00aaff"];

let board = createBoard();
let shapes = [createShape(), createShape(), createShape()];

function createBoard(){
  return Array.from({length:SIZE},()=>Array(SIZE).fill(0));
}
function createShape(){
  return Array.from({length:SHAPE_SIZE},()=>Array(SHAPE_SIZE).fill(0));
}

const boardCanvas = document.getElementById("board");
const bctx = boardCanvas.getContext("2d");

function drawBoard(b = board){
  bctx.clearRect(0,0,320,320);
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      bctx.strokeStyle="#555";
      bctx.strokeRect(j*40,i*40,40,40);
      if(b[i][j]){
        bctx.fillStyle="#4caf50";
        bctx.fillRect(j*40,i*40,40,40);
      }
    }
  }
}

boardCanvas.addEventListener("click",(e)=>{
  const rect = boardCanvas.getBoundingClientRect();
  const x = Math.floor((e.clientY - rect.top)/40);
  const y = Math.floor((e.clientX - rect.left)/40);

  if(x>=0 && y>=0 && x<SIZE && y<SIZE){
    board[x][y] ^= 1;
    drawBoard();
  }
});

const shapeCanvas = [
  document.getElementById("shape0"),
  document.getElementById("shape1"),
  document.getElementById("shape2")
];

shapeCanvas.forEach((canvas,index)=>{
  canvas.addEventListener("click",(e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientY - rect.top)/40);
    const y = Math.floor((e.clientX - rect.left)/40);

    if(x>=0 && y>=0 && x<5 && y<5){
      shapes[index][x][y] ^= 1;
      drawShape(index);
    }
  });
});

function drawShape(i){
  const ctx = shapeCanvas[i].getContext("2d");
  ctx.clearRect(0,0,200,200);

  for(let x=0;x<5;x++){
    for(let y=0;y<5;y++){
      ctx.strokeStyle="#555";
      ctx.strokeRect(y*40,x*40,40,40);

      if(shapes[i][x][y]){
        ctx.fillStyle=COLORS[i];
        ctx.fillRect(y*40,x*40,40,40);
      }
    }
  }
}

function drawAllShapes(){
  for(let i=0;i<3;i++) drawShape(i);
}

function trimShape(shape){
  let minX=5,minY=5,maxX=0,maxY=0,found=false;

  for(let i=0;i<5;i++){
    for(let j=0;j<5;j++){
      if(shape[i][j]){
        found=true;
        minX=Math.min(minX,i);
        minY=Math.min(minY,j);
        maxX=Math.max(maxX,i);
        maxY=Math.max(maxY,j);
      }
    }
  }

  if(!found) return [[0]];

  let res=[];
  for(let i=minX;i<=maxX;i++){
    let row=[];
    for(let j=minY;j<=maxY;j++){
      row.push(shape[i][j]);
    }
    res.push(row);
  }

  return res;
}

function canPlace(shape,x,y,b){
  for(let i=0;i<shape.length;i++){
    for(let j=0;j<shape[0].length;j++){
      if(shape[i][j]){
        if(x+i>=SIZE || y+j>=SIZE) return false;
        if(b[x+i][y+j]) return false;
      }
    }
  }
  return true;
}

function clearLines(b){
  let changed=true;
  while(changed){
    changed=false;

    for(let i=0;i<SIZE;i++){
      if(b[i].every(v=>v==1)){
        for(let j=0;j<SIZE;j++) b[i][j]=0;
        changed=true;
      }
    }

    for(let j=0;j<SIZE;j++){
      let full=true;
      for(let i=0;i<SIZE;i++){
        if(!b[i][j]) full=false;
      }
      if(full){
        for(let i=0;i<SIZE;i++) b[i][j]=0;
        changed=true;
      }
    }
  }
}

function simulate(board,shape,x,y){
  let temp = board.map(r=>r.slice());

  for(let i=0;i<shape.length;i++){
    for(let j=0;j<shape[0].length;j++){
      if(shape[i][j]){
        temp[x+i][y+j] = 1;
      }
    }
  }

  clearLines(temp);
  return temp;
}

function resetBoard(){
  board = createBoard();
  shapes = [createShape(), createShape(), createShape()];
  drawBoard();
  drawAllShapes();
  document.getElementById("preview").innerHTML="";
}

function evaluateBoard(b){
  let empty = 0;
  let holes = 0;

  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(!b[i][j]) empty++;
      else if(i+1<SIZE && !b[i+1][j]) holes++;
    }
  }

  return empty - holes*3;
}

function getAllMoves(shape,b){
  let moves=[];
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(canPlace(shape,x,y,b)) moves.push([x,y]);
    }
  }
  return moves;
}

function searchBestSequence(){
  let bestScore=-Infinity;
  let bestSeq=null;

  const perms = [
    [0,1,2],[0,2,1],
    [1,0,2],[1,2,0],
    [2,0,1],[2,1,0]
  ];

  for(let p of perms){

    function dfs(depth,currentBoard,steps,score){
      if(depth===3){
        let finalScore = score + evaluateBoard(currentBoard);
        if(finalScore>bestScore){
          bestScore=finalScore;
          bestSeq=[...steps];
        }
        return;
      }

      let shape = trimShape(shapes[p[depth]]);
      if(shape.length===1 && shape[0][0]===0){
        dfs(depth+1,currentBoard,steps,score);
        return;
      }

      let moves = getAllMoves(shape,currentBoard);
      if(moves.length===0){
        dfs(depth+1,currentBoard,steps,score);
        return;
      }

      for(let [x,y] of moves){
        let next = simulate(currentBoard,shape,x,y);
        dfs(depth+1,next,[...steps,{shape:p[depth],x,y}],score);
      }
    }

    dfs(0,board,[],0);
  }

  return bestSeq;
}

function drawMiniBoard(containerId,b){
  let container=document.getElementById(containerId);
  container.innerHTML="";

  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      let cell=document.createElement("div");
      cell.style.width="20px";
      cell.style.height="20px";
      cell.style.display="inline-block";
      cell.style.border="1px solid #333";
      cell.style.background = b[i][j] ? "#4caf50" : "#111";
      container.appendChild(cell);
    }
    container.appendChild(document.createElement("br"));
  }
}

function showAI(){
  let seq = searchBestSequence();

  if(!seq || seq.length===0){
    alert("ไม่มีทางวาง");
    return;
  }

  let tempBoard = JSON.parse(JSON.stringify(board));
  let preview = document.getElementById("preview");
  preview.innerHTML="";

  seq.forEach((step,index)=>{
    let shape = trimShape(shapes[step.shape]);
    tempBoard = simulate(tempBoard,shape,step.x,step.y);

    let title=document.createElement("div");
    title.innerText=`STEP ${index+1} → บล็อก ${step.shape} (${step.x},${step.y})`;
    preview.appendChild(title);

    let mini=document.createElement("div");
    mini.id="mini_"+index;
    preview.appendChild(mini);

    drawMiniBoard(mini.id,tempBoard);
  });
}

function applyAI(){
  let seq = searchBestSequence();

  if(!seq || seq.length===0){
    alert("ใช้ไม่ได้");
    return;
  }

  let tempBoard = JSON.parse(JSON.stringify(board));

  seq.forEach(step=>{
    let shape = trimShape(shapes[step.shape]);
    tempBoard = simulate(tempBoard,shape,step.x,step.y);
  });

  board=tempBoard;
  shapes=[createShape(),createShape(),createShape()];

  drawBoard();
  drawAllShapes();
  document.getElementById("preview").innerHTML="";
}

drawBoard();
drawAllShapes();

document.body.insertAdjacentHTML("beforeend", `
<br><br>
<button onclick="showAI()">แนะนำลำดับ</button>
<button onclick="applyAI()">เซฟใช้ต่อไป</button>

<br><br>
<button onclick="clearLines(board);drawBoard()">เคลียร์แถว</button>
`);
</script>

</body>
</html>
