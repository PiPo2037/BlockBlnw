<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block AI ENGINE MAX</title>

<style>
html, body{
  margin:0;
  padding:0;
  background:#222;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
  overflow-x:hidden;
  touch-action: manipulation;
}

*{
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}

canvas{
  background:#111;
  margin:10px auto;
  width:90vw;
  max-width:320px;
  display:block;
}

.wrap canvas{
  width:28vw;
  max-width:120px;
}

.wrap{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.preview{
  display:flex;
  flex-direction:column;
  align-items:center;
}

button{
  margin:6px;
  padding:10px 14px;
  font-size:16px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>Block AI ENGINE MAX</h2>

<canvas id="board" width="320" height="320"></canvas>
<button onclick="resetBoard()">รีเซ็ต</button>

<div class="wrap">
  <canvas id="shape0" width="200" height="200"></canvas>
  <canvas id="shape1" width="200" height="200"></canvas>
  <canvas id="shape2" width="200" height="200"></canvas>
</div>

<div id="preview" class="preview"></div>

<script>
const SIZE=8, SHAPE_SIZE=5;
const COLORS=["#ff4444","#ff9900","#00aaff"];

let board=createBoard();
let shapes=[createShape(),createShape(),createShape()];

function createBoard(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0));}
function createShape(){return Array.from({length:SHAPE_SIZE},()=>Array(SHAPE_SIZE).fill(0));}

const boardCanvas=document.getElementById("board");
const bctx=boardCanvas.getContext("2d");

function drawBoard(b=board){
  bctx.clearRect(0,0,320,320);
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      bctx.strokeStyle="#555";
      bctx.strokeRect(j*40,i*40,40,40);
      if(b[i][j]){
        bctx.fillStyle="#4caf50";
        bctx.fillRect(j*40,i*40,40,40);
      }
    }
  }
}

boardCanvas.addEventListener("touchstart",(e)=>{
  e.preventDefault();
  let rect=boardCanvas.getBoundingClientRect();
  let t=e.touches[0];
  let x=Math.floor((t.clientY-rect.top)/(rect.height/8));
  let y=Math.floor((t.clientX-rect.left)/(rect.width/8));
  if(x>=0&&y>=0&&x<8&&y<8){
    board[x][y]^=1;
    drawBoard();
  }
},{passive:false});

const shapeCanvas=[
document.getElementById("shape0"),
document.getElementById("shape1"),
document.getElementById("shape2")
];

shapeCanvas.forEach((c,i)=>{
  c.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    let rect=c.getBoundingClientRect();
    let t=e.touches[0];
    let x=Math.floor((t.clientY-rect.top)/(rect.height/5));
    let y=Math.floor((t.clientX-rect.left)/(rect.width/5));
    if(x>=0&&y>=0&&x<5&&y<5){
      shapes[i][x][y]^=1;
      drawShape(i);
    }
  },{passive:false});
});

function drawShape(i){
  let ctx=shapeCanvas[i].getContext("2d");
  ctx.clearRect(0,0,200,200);
  for(let x=0;x<5;x++){
    for(let y=0;y<5;y++){
      ctx.strokeStyle="#555";
      ctx.strokeRect(y*40,x*40,40,40);
      if(shapes[i][x][y]){
        ctx.fillStyle=COLORS[i];
        ctx.fillRect(y*40,x*40,40,40);
      }
    }
  }
}
function drawAllShapes(){for(let i=0;i<3;i++)drawShape(i);}

function trimShape(s){
  let minX=5,minY=5,maxX=0,maxY=0,f=false;
  for(let i=0;i<5;i++)for(let j=0;j<5;j++){
    if(s[i][j]){
      f=true;
      minX=Math.min(minX,i);minY=Math.min(minY,j);
      maxX=Math.max(maxX,i);maxY=Math.max(maxY,j);
    }
  }
  if(!f)return [[0]];
  let r=[];
  for(let i=minX;i<=maxX;i++){
    let row=[];
    for(let j=minY;j<=maxY;j++)row.push(s[i][j]);
    r.push(row);
  }
  return r;
}

function canPlace(s,x,y,b){
  for(let i=0;i<s.length;i++)
    for(let j=0;j<s[0].length;j++)
      if(s[i][j]){
        if(x+i>=8||y+j>=8||b[x+i][y+j])return false;
      }
  return true;
}

function clearLines(b){
  let ch=true;
  while(ch){
    ch=false;
    for(let i=0;i<8;i++){
      if(b[i].every(v=>v)){
        for(let j=0;j<8;j++)b[i][j]=0;
        ch=true;
      }
    }
    for(let j=0;j<8;j++){
      let full=true;
      for(let i=0;i<8;i++)if(!b[i][j])full=false;
      if(full){
        for(let i=0;i<8;i++)b[i][j]=0;
        ch=true;
      }
    }
  }
}

function simulate(b,s,x,y){
  let t=b.map(r=>r.slice());
  for(let i=0;i<s.length;i++)
    for(let j=0;j<s[0].length;j++)
      if(s[i][j])t[x+i][y+j]=1;
  clearLines(t);
  return t;
}

function evaluate(b){
  let empty=0,holes=0;
  for(let i=0;i<8;i++)
    for(let j=0;j<8;j++){
      if(!b[i][j])empty++;
      else if(i+1<8&&!b[i+1][j])holes++;
    }
  return empty-holes*3;
}

function getMoves(s,b){
  let m=[];
  for(let x=0;x<8;x++)
    for(let y=0;y<8;y++)
      if(canPlace(s,x,y,b))m.push([x,y]);
  return m;
}

function search(){
  let best=-Infinity,seq=null;
  let perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];

  for(let p of perms){
    function dfs(d,b,steps){
      if(d===3){
        let sc=evaluate(b);
        if(sc>best){best=sc;seq=[...steps];}
        return;
      }
      let s=trimShape(shapes[p[d]]);
      let moves=getMoves(s,b);
      if(!moves.length)return dfs(d+1,b,steps);
      for(let [x,y] of moves){
        let nb=simulate(b,s,x,y);
        dfs(d+1,nb,[...steps,{shape:p[d],x,y}]);
      }
    }
    dfs(0,board,[]);
  }
  return seq;
}

function drawMini(id,b,s=null,x=0,y=0){
  let c=document.getElementById(id); c.innerHTML="";
  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){
      let d=document.createElement("div");
      d.style.width="20px"; d.style.height="20px";
      d.style.display="inline-block";
      d.style.border="1px solid #333";

      let col=b[i][j]?"#4caf50":"#111";

      if(s){
        for(let si=0;si<s.length;si++)
          for(let sj=0;sj<s[0].length;sj++)
            if(s[si][sj]&&i===x+si&&j===y+sj) col="#ff4444";
      }

      d.style.background=col;
      c.appendChild(d);
    }
    c.appendChild(document.createElement("br"));
  }
}

function showAI(){
  let seq=search();
  if(!seq)return alert("ไม่มีทางวาง");

  let temp=JSON.parse(JSON.stringify(board));
  let pv=document.getElementById("preview");
  pv.innerHTML="";

  seq.forEach((st,i)=>{
    let s=trimShape(shapes[st.shape]);

    let t=document.createElement("div");
    t.innerText="STEP "+(i+1);
    pv.appendChild(t);

    let m=document.createElement("div");
    m.id="m"+i;
    pv.appendChild(m);

    drawMini(m.id,temp,s,st.x,st.y);

    temp=simulate(temp,s,st.x,st.y);
  });
}

function applyAI(){
  let seq=search();
  if(!seq)return;

  let temp=JSON.parse(JSON.stringify(board));
  seq.forEach(st=>{
    let s=trimShape(shapes[st.shape]);
    temp=simulate(temp,s,st.x,st.y);
  });

  board=temp;
  shapes=[createShape(),createShape(),createShape()];
  drawBoard();
  drawAllShapes();
  document.getElementById("preview").innerHTML="";
}

function resetBoard(){
  board=createBoard();
  shapes=[createShape(),createShape(),createShape()];
  drawBoard();drawAllShapes();
}

drawBoard();drawAllShapes();

document.body.insertAdjacentHTML("beforeend",`
<br>
<button onclick="showAI()">แนะนำ</button>
<button onclick="applyAI()">ใช้</button>
`);

let last=0;
document.addEventListener("touchend",(e)=>{
  let now=Date.now();
  if(now-last<300)e.preventDefault();
  last=now;
});
</script>

</body>
</html>
